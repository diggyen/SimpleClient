set timeout=1
set default=0

# Load video drivers for EFI
insmod efi_gop
insmod efi_uga
insmod vbe

# Set graphical console
set gfxpayload=1024x768x32
terminal_output gfxterm

menuentry "SimpleClient" {
    linux /boot/vmlinuz quiet loglevel=0 console=tty0 panic=5 vt.global_cursor_default=0 video=1024x768-32
    initrd /boot/initramfs.cpio.gz
}
